services:
  db:
    image: postgres:16-alpine
    container_name: luggify-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: luggify
      POSTGRES_PASSWORD: luggify
      POSTGRES_DB: luggify_db
    ports:
      - "5432:5432"
    volumes:
      - luggify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U luggify -d luggify_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: luggify-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://luggify:luggify@db:5432/luggify_db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_AUTH_MAX_AGE: ${TELEGRAM_AUTH_MAX_AGE:-86400}
      ALLOW_INSECURE_TELEGRAM_AUTH: ${ALLOW_INSECURE_TELEGRAM_AUTH:-false}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY:-}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: luggify-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_URL: /api
      VITE_PROXY_API_URL: http://server:8000
      VITE_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-luggify_bot}
    depends_on:
      - server

  telegram-bot:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: luggify-telegram-bot
    restart: unless-stopped
    profiles:
      - telegram
    volumes:
      - ./server:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://luggify:luggify@db:5432/luggify_db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_MINI_APP_URL: ${TELEGRAM_MINI_APP_URL:-}
      WEB_APP_URL: ${WEB_APP_URL:-}
      TELEGRAM_AUTH_MAX_AGE: ${TELEGRAM_AUTH_MAX_AGE:-86400}
      ALLOW_INSECURE_TELEGRAM_AUTH: ${ALLOW_INSECURE_TELEGRAM_AUTH:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-}
    command: python -m telegram_bot.main
    depends_on:
      db:
        condition: service_healthy

volumes:
  luggify_pgdata:
